name: Android Release

on:
  push:
    branches: [ main, Self]

jobs:
  build-release:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # 解码并保存 Keystore 文件
      - name: Decode Keystore
        run: |
          echo ${{ secrets.KEYSTORE_BASE64 }} | base64 -d > app/release.keystore

      # 设置签名环境变量
      - name: Set up keystore properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "storeFile=release.keystore" > keystore.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> keystore.properties
          echo "keyPassword=$KEY_PASSWORD" >> keystore.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 构建 Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename Release APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/OneUIX_${{ github.ref_name }}_release.apk

#     - name: Upload Release Assets
#       uses: softprops/action-gh-release@v2
#       with:
#         files: |
#           app/build/outputs/apk/release/OneUIX_*.apk
#       env:
#         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 上传 Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/release/OneUIX_${{ github.ref_name }}_release.apk
          retention-days: 90
          archive: false

  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 构建 Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename Debug APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/OneUIX_${{ github.ref_name }}_debug.apk

      # 上传 Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/OneUIX_${{ github.ref_name }}_debug.apk
          retention-days: 90
          archive: false
          